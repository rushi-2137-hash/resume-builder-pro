<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Templates - Resume Builder</title>
  <link rel="stylesheet" href="style.css?v=2.0">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="dashboard-body">
  <div class="canvas">
    <div class="device-frame">
      <div class="resume-header">
        <div class="header-left" onclick="window.history.back()">
          <i data-lucide="arrow-left"></i>
          <span class="header-title">Browse Templates</span>
        </div>
      </div>
      <div class="scrollable-content" style="padding: 20px;">
        <p>Select a professional template to match your style.</p>
        <!-- Grid of templates -->
      </div>
    </div>
  </div>
  <script>lucide.createIcons();</script>
</body>
</html>
