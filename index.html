<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resume Builder - Login</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="dashboard-body">
  <div class="login-page">
    <!-- Left Side: Hero Section (Desktop Only) -->
    <div class="login-hero-side">
      <div class="hero-decoration"></div>
      <div class="login-hero-content">
        <div style="background: rgba(255,255,255,0.15); padding: 8px 16px; border-radius: 20px; display: inline-flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 600; margin-bottom: 30px; backdrop-filter: blur(10px);">
           <span style="color: #FFD700;">✦</span> Premium AI Resume Builder
        </div>
        <h1 class="login-hero-title">Unlock Your<br>Career Potential.</h1>
        <p class="login-hero-subtitle">Build professional, ATS-ready resumes in minutes with our 30+ stunning templates. Stand out from the crowd and land your dream job.</p>
        
        <div style="position: relative; margin-top: 40px;">
           <img src="https://img.freepik.com/premium-vector/online-curriculum-vitae-concept-illustration_114360-192.jpg" alt="Resume Builder Pro" class="hero-mockup-img">
        </div>
      </div>
    </div>

    <!-- Right Side: Form Section -->
    <div class="login-form-side">
      <div class="form-container-inner">
        <div style="margin-bottom: 40px;">
          <h2 style="font-size: 34px; font-weight: 800; color: #1a1a1a; margin-bottom: 8px; letter-spacing: -0.5px;">Welcome back</h2>
          <p style="color: #666; font-size: 15px; font-weight: 500;">Please enter your details to sign in.</p>
        </div>

        <button id="google-login" class="google-btn" onclick="window.location.href='home.html'" style="width: 100%; margin-bottom: 24px; height: 56px; border-radius: 14px; font-weight: 600; font-size: 16px; display: flex; align-items: center; justify-content: center; gap: 12px; border: 1.5px solid #eee; background: white; transition: all 0.3s ease;">
          <img src="https://cdn-icons-png.flaticon.com/512/281/281764.png" class="google-icon" alt="Google" style="width: 22px;">
          Continue with Google
        </button>

        <div class="divider-wrapper" style="margin-bottom: 24px;">
          <div class="divider-line"></div>
          <span style="font-size: 12px; font-weight: 700; color: #bbb; padding: 0 15px; text-transform: uppercase; letter-spacing: 1px;">OR</span>
          <div class="divider-line"></div>
        </div>

        <div class="form-inputs" style="gap: 16px; margin-bottom: 24px; display: flex; flex-direction: column;">
          <div class="input-group">
            <label style="display: block; font-size: 13px; font-weight: 700; color: #333; margin-bottom: 8px;">Email Address</label>
            <input type="email" id="email" placeholder="name@company.com" class="input-field" style="height: 56px; background: #f8f9fc; border: 1px solid #eef0f2; border-radius: 12px; width: 100%; padding: 0 16px;">
          </div>

          <div class="input-group">
            <label style="display: block; font-size: 13px; font-weight: 700; color: #333; margin-bottom: 8px;">Password</label>
            <input type="password" id="password" placeholder="••••••••" class="input-field" style="height: 56px; background: #f8f9fc; border: 1px solid #eef0f2; border-radius: 12px; width: 100%; padding: 0 16px;">
          </div>
        </div>

        <button id="email-continue" class="primary-btn" onclick="window.location.href='home.html'" style="width: 100%; height: 58px; border-radius: 14px; font-size: 16px; font-weight: 700; margin-bottom: 24px; background: #0A214D; color: white; border: none; cursor: pointer; box-shadow: 0 10px 20px rgba(10,33,77,0.15);">Sign In</button>
        
        <div style="text-align: center; border-top: 1px solid #f0f0f0; padding-top: 24px;">
          <a href="home.html" class="skip-link" style="font-size: 15px; color: #482E87; font-weight: 700; text-decoration: none; display: inline-flex; align-items: center; gap: 8px;">
            Skip for now
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14m-7-7 7 7-7 7"/></svg>
          </a>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
