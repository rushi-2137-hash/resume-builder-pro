<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resume Builder - Login</title>
  <link rel="stylesheet" href="style.css?v=2.0">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app">
    <div class="login-container">
      <div class="hero-section">
        <div class="illustration-wrapper">
          <img src="assets/hero.png" alt="Hero" class="hero-img">
          <h1 class="app-title">Resume<br>Pro</h1>
        </div>
      </div>

      <div class="form-section">
        <button class="google-btn">
          <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png" class="google-icon" alt="Google">
          Sign up with Google
        </button>

        <div class="divider-wrapper">
          <div class="divider-line"></div>
          <span>OR</span>
          <div class="divider-line"></div>
        </div>

        <div class="form-inputs">
          <div class="input-group">
            <input type="email" placeholder="Email address" class="input-field">
          </div>
          <div class="input-group">
            <input type="password" placeholder="Password" class="input-field">
          </div>
        </div>

        <button class="primary-btn" onclick="window.location.href='home.html'">Join now</button>
        <a href="home.html" class="skip-link">Skip for now</a>
      </div>
    </div>
  </div>
</body>
</html>
