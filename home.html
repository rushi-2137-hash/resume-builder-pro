<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Builder - Dashboard</title>
    <link rel="stylesheet" href="style.css?v=3.0">
    <!-- Google Font: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Data Persistence -->
    <script src="storage_manager.js"></script>
</head>
<body class="dashboard-body">

    <div class="canvas">
        <div class="device-frame">
            <!-- Professional Header -->
            <div class="dashboard-header">
                <div class="header-content">
                    <div class="user-greeting">
                        <span class="greeting-text">Hello,</span>
                        <h1 class="user-name">Professional</h1>
                    </div>
                    <div class="profile-action">
                        <div class="profile-avatar">P</div>
                    </div>
                </div>
            </div>

            <!-- Dashboard Content -->
            <div class="dashboard-content scrollable-content">
                <!-- Search & Filters -->
                <div class="search-bar-container">
                    <div class="search-input-wrapper">
                        <i data-lucide="search" class="search-icon"></i>
                        <input type="text" placeholder="Search your resumes..." class="search-input">
                    </div>
                    <button class="filter-btn">
                        <i data-lucide="sliders-horizontal"></i>
                    </button>
                </div>

                <!-- Resume Sections -->
                <div class="resume-section">
                    <div class="section-header">
                        <h2 class="section-title">My Resumes</h2>
                        <a href="#" class="view-all">View All</a>
                    </div>

                    <div class="resume-grid" id="resume-grid">
                        <!-- Create New Card -->
                        <div class="create-card" onclick="window.location.href='resume_info.html?flow=create'">
                            <div class="create-icon-wrapper">
                                <i data-lucide="plus"></i>
                            </div>
                            <span class="create-text">Create New</span>
                        </div>

                        <!-- Dynamic Resume Cards will be injected here -->
                    </div>
                </div>

                <!-- Recent Templates / Suggestions -->
                <div class="templates-preview-section">
                    <div class="section-header">
                        <h2 class="section-title">Popular Templates</h2>
                    </div>
                    <div class="template-strip">
                        <div class="template-thumb purple"></div>
                        <div class="template-thumb blue"></div>
                        <div class="template-strip-mask"></div>
                    </div>
                </div>
            </div>

            <!-- Bottom Navigation -->
            <div class="bottom-navigation">
                <div class="nav-item active">
                    <i data-lucide="layout-grid"></i>
                    <span>Home</span>
                    <div class="active-line"></div>
                </div>
                <div class="nav-item" onclick="window.location.href='templates.html'">
                    <i data-lucide="file-text"></i>
                    <span>Templates</span>
                </div>
                <div class="nav-item">
                    <i data-lucide="settings"></i>
                    <span>Settings</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        function renderResumes() {
            const grid = document.getElementById('resume-grid');
            const resumes = StorageManager.getAllResumes();
            
            // Keep the create card
            const createCard = grid.querySelector('.create-card');
            grid.innerHTML = '';
            grid.appendChild(createCard);

            resumes.forEach(resume => {
                const card = document.createElement('div');
                card.className = 'resume-card';
                card.innerHTML = `
                    <div class="resume-preview" onclick="StorageManager.setActiveId('${resume.id}'); window.location.href='resume_preview.html'">
                        <div class="resume-mock-content">
                            <div class="mock-line Title"></div>
                            <div class="mock-line"></div>
                            <div class="mock-line"></div>
                        </div>
                    </div>
                    <div class="resume-info">
                        <div class="resume-details">
                            <span class="resume-name">${resume.full_name || 'Untitled Resume'}</span>
                            <span class="resume-date">${new Date(resume.updatedAt).toLocaleDateString()}</span>
                        </div>
                        <div class="resume-actions">
                             <button class="action-icon-btn btn-share" onclick="event.stopPropagation(); shareResume('${resume.id}')">
                                <i data-lucide="share-2"></i>
                            </button>
                            <button class="action-icon-btn" onclick="event.stopPropagation(); deleteResume('${resume.id}')">
                                <i data-lucide="trash-2"></i>
                            </button>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
            lucide.createIcons();
        }

        function deleteResume(id) {
            if(confirm('Are you sure you want to delete this resume?')) {
                StorageManager.deleteResume(id);
                renderResumes();
            }
        }

        async function shareResume(id) {
            const shareData = {
                title: 'Resume Builder Pro',
                text: 'Check out my professional resume!',
                url: window.location.href.replace('home.html', 'resume_preview.html') + '?shared=' + id
            };

            try {
                if (navigator.share) {
                    await navigator.share(shareData);
                } else {
                    await navigator.clipboard.writeText(shareData.url);
                    alert('Link copied to clipboard!');
                }
            } catch (err) {
                console.error('Share failed:', err);
            }
        }

        window.onload = renderResumes;
    </script>
</body>
</html>
