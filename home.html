<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resume Builder - Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <!-- Google Font: Outfit -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- Data Persistence -->
  <script src="storage_manager.js"></script>
</head>
<body class="dashboard-body">

  <div class="canvas">
    <div class="device-frame">
      <div class="scrollable-content">
        <!-- Top Section: Greeting & Profile -->
        <div class="top-section">
          <div class="greeting-row">
            <div class="greeting-content">
              <h1 class="greeting">Hi, Professional! 👋</h1>
              <p class="subtitle">Welcome to your resume dashboard</p>
            </div>
            <div class="user-profile-icon">
              <i data-lucide="circle-user-round"></i>
            </div>
          </div>
        </div>

        <!-- Create New Resume Card -->
        <div class="primary-action-card" id="create-resume-btn">
          <div class="plus-circle-inner">
            <i data-lucide="plus"></i>
          </div>
          <span class="card-cta">CREATE NEW RESUME</span>
        </div>

        <!-- Saved Resumes Title Row -->
        <div class="resumes-row">
          <h2 class="resumes-title">Your Resumes</h2>
          <div style="color: #482E87; font-size: 13px; font-weight: 600;">View All</div>
        </div>

        <!-- Resumes List -->
        <div class="resumes-list" id="resumes-list">
          <!-- Dynamically populated -->
        </div>
      </div>

      <!-- Bottom Navigation -->
      <div class="bottom-navigation">
        <div class="nav-item active" onclick="window.location.href='home.html'">
          <i data-lucide="home"></i>
          <span>Home</span>
          <div class="active-line"></div>
        </div>
        <div class="nav-item" onclick="window.location.href='templates.html'">
          <i data-lucide="file-text"></i>
          <span>Templates</span>
        </div>
        <div class="nav-item" id="nav-profile">
          <i data-lucide="user"></i>
          <span>Profile</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    lucide.createIcons();

    function renderSavedResumes() {
      const listContent = document.getElementById('resumes-list');
      const resumes = StorageManager.getAllResumes();

      if (resumes.length === 0) {
        listContent.innerHTML = `
          <div class="empty-state-msg">
            <i data-lucide="file-question" style="width: 48px; height: 48px; opacity: 0.2; margin-bottom: 10px;"></i>
            <p>You haven't created any resumes yet.<br>Click the blue card above to start!</p>
          </div>
        `;
        lucide.createIcons();
        return;
      }

      listContent.innerHTML = resumes.map(res => `
        <div class="saved-resume-card">
          <div class="resume-card-info" onclick="editResume('${res.id}')">
            <div class="resume-card-name">${res.full_name || 'Untitled Resume'}</div>
            <div class="resume-card-date">Modified: ${new Date(res.lastModified).toLocaleDateString()}</div>
          </div>
          <div class="resume-card-actions">
            <button class="action-btn" onclick="previewResume('${res.id}')" title="Preview">
              <i data-lucide="eye"></i>
            </button>
            <button class="action-btn delete" onclick="deleteResume('${res.id}')" title="Delete">
              <i data-lucide="trash-2"></i>
            </button>
          </div>
        </div>
      `).join('');
      lucide.createIcons();
    }

    function editResume(id) {
      StorageManager.setActiveId(id);
      sessionStorage.setItem('resume_builder_flow', 'edit');
      window.location.href = 'resume_info.html?flow=edit';
    }

    function previewResume(id) {
      StorageManager.setActiveId(id);
      window.location.href = 'resume_preview.html';
    }

    function deleteResume(id) {
      if (confirm('Are you sure you want to delete this resume?')) {
        StorageManager.deleteResume(id);
        renderSavedResumes();
      }
    }

    document.getElementById('create-resume-btn').onclick = () => {
      const newId = StorageManager.createNewResume();
      StorageManager.setActiveId(newId);
      sessionStorage.setItem('resume_builder_flow', 'create');
      window.location.href = 'resume_info.html?flow=create';
    };

    renderSavedResumes();
  </script>
</body>
</html>
