<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resume Builder - Home</title>
  <link rel="stylesheet" href="style.css?v=2.0">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="storage_manager.js"></script>
</head>
<body class="dashboard-body">
  <div class="canvas">
    <div class="device-frame">
      <div class="top-section">
        <div class="greeting-row">
          <div>
            <h2 class="greeting">Hello,</h2>
            <p class="subtitle">Start building your professional resume</p>
          </div>
          <div class="user-profile-icon">
            <i data-lucide="user-circle-2"></i>
          </div>
        </div>
      </div>

      <div class="primary-action-card" onclick="window.location.href='resume_info.html?flow=create'">
        <div class="plus-circle-inner">
          <i data-lucide="plus"></i>
        </div>
        <span class="card-cta">Create New Resume</span>
      </div>

      <div class="resumes-row">
        <h3 class="resumes-title">Recent Resumes</h3>
      </div>
      
      <div class="scrollable-content" id="recent-resumes-list" style="padding: 0 24px;">
        <!-- List will be populated by storage_manager.js -->
      </div>

      <div class="bottom-navigation">
        <div class="nav-item active">
          <i data-lucide="home"></i>
          <span>Home</span>
          <div class="active-line"></div>
        </div>
        <div class="nav-item" onclick="window.location.href='templates.html'">
          <i data-lucide="file-text"></i>
          <span>Templates</span>
        </div>
        <div class="nav-item-profile">
           <!-- Profile placeholder -->
        </div>
      </div>
    </div>
  </div>
  <script>lucide.createIcons();</script>
</body>
</html>
