<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resume Builder - Resume Info</title>
  <link rel="stylesheet" href="style.css?v=2.0">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
  <script src="storage_manager.js"></script>
</head>
<body class="dashboard-body">
  <div class="canvas">
    <div class="device-frame">
      <div class="resume-header">
        <div class="header-left">
          <i data-lucide="arrow-left" onclick="window.location.href='home.html'"></i>
          <span class="header-title">Resume Info</span>
        </div>
        <div class="header-right">
          <i data-lucide="home" onclick="window.location.href='home.html'"></i>
          <i data-lucide="gem" class="premium-icon"></i>
        </div>
      </div>

      <div class="scrollable-content">
        <div class="profile-pic-section" id="profile-heading-section">
          <div class="profile-pic-container" id="profile-pic-trigger">
            <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" id="profile-img-preview" alt="Profile">
            <div class="camera-badge">
              <i data-lucide="camera"></i>
            </div>
          </div>
          <input type="file" id="profile-input" style="display: none;" accept="image/*">
          <p class="profile-label">Update Photo</p>
        </div>

        <div class="resume-form" id="resume-form-container">
          <div class="step-content">
            <h3 class="section-heading">Personal Details</h3>
            <div class="input-group-labeled">
              <label>Full Name</label>
              <input type="text" id="full_name" placeholder="John Doe" class="underlined-input">
            </div>
            <div class="input-group-labeled">
              <label>Phone Number</label>
              <input type="text" id="contact_no" placeholder="+1 234 567 890" class="underlined-input">
            </div>
            <div class="input-group-labeled">
              <label>Email Address</label>
              <input type="email" id="email" placeholder="john.doe@example.com" class="underlined-input">
            </div>
          </div>
        </div>
      </div>

      <div class="form-footer" style="padding: 0 24px 30px;">
        <button class="next-btn" onclick="window.location.href='templates.html'">Continue</button>
      </div>
    </div>
  </div>
  <script>lucide.createIcons();</script>
</body>
</html>
