<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resume Preview - Resume Builder</title>
  <link rel="stylesheet" href="style.css?v=3.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="storage_manager.js"></script>
  <style>
    .resume-container {
      width: 100%;
      height: 100%;
      overflow-y: auto;
      background: #f1f3f6;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px 0 100px;
    }

    /* A4 Preview Canvas */
    .preview-canvas {
      width: 210mm;
      min-height: 297mm;
      background: #fff;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      position: relative;
      transform-origin: top center;
    }

    @media (max-width: 210mm) {
      .preview-canvas {
        width: 95vw;
        height: auto;
        min-height: 135vw;
        margin: 0 auto;
      }
    }

    /* Responsive preview top actions */
    .preview-top-actions {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255, 255, 255, 0.95);
      padding: 12px 24px;
      border-radius: 40px;
      display: flex;
      gap: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
      z-index: 1000;
      border: 1px solid rgba(0,0,0,0.05);
      backdrop-filter: blur(10px);
    }

    .preview-action-btn {
      padding: 10px 20px;
      border-radius: 20px;
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-download { background: #482E87; color: white; }
    .btn-print { background: #f0f0f5; color: #482E87; }
    .btn-share { background: #f0f0f5; color: #482E87; }

    /* Hide UI elements from printed scan */
    .no-print { display: none !important; }

    /* Standard Resume Template Elements */
    .res-header { margin-bottom: 25px; }
    .res-name { font-size: 24px; font-weight: 700; color: #333; margin-bottom: 5px; }
    .res-sub { font-size: 14px; color: #666; display: flex; gap: 15px; flex-wrap: wrap; }
    .res-section { margin-bottom: 20px; }
    .res-section-title { font-size: 16px; font-weight: 700; color: #482E87; border-bottom: 2px solid #f0f0f0; margin-bottom: 10px; padding-bottom: 4px; }
  </style>
</head>
<body class="dashboard-body">

  <div class="canvas">
    <div class="device-frame">
      <!-- Fixed Header -->
      <div class="resume-header">
        <div class="header-left" onclick="window.history.back()">
          <i data-lucide="arrow-left"></i>
          <span class="header-title">Final Result</span>
        </div>
        <div class="header-right">
          <i data-lucide="share-2" onclick="shareResume()"></i>
          <i data-lucide="download" onclick="downloadPDF()"></i>
        </div>
      </div>

      <!-- Preview Side-by-Side (Desktop only styles in style.css) -->
      <div class="preview-canvas-wrapper" style="flex: 1; overflow: hidden; display: flex;">
        <!-- Theme Sidebar (Desktop) -->
        <div class="desktop-preview-sidebar">
           <h3 class="sidebar-header-title">Templates</h3>
           <div class="theme-selector-grid" id="desktop-theme-grid">
               <!-- Theme circles in desktop-->
           </div>
        </div>

        <div class="resume-container">
          <!-- A4 Page Target -->
          <div id="resume-a4-page" class="preview-canvas">
            <!-- Dynamic Content Injected Here -->
          </div>
        </div>
      </div>

      <!-- Mobile Actions -->
      <div class="preview-top-actions">
        <button class="preview-action-btn btn-print" onclick="window.print()">
          <i data-lucide="printer"></i> Print
        </button>
        <button class="preview-action-btn btn-download" onclick="downloadPDF()">
          <i data-lucide="download"></i> Download
        </button>
        <button class="preview-action-btn btn-share" onclick="shareResume()">
          <i data-lucide="share-2"></i> Share
        </button>
      </div>
    </div>
  </div>

  <script id="preview-logic">
    const { jsPDF } = window.jspdf;
    const urlParams = new URLSearchParams(window.location.search);
    const templateId = urlParams.get('template') || 'modern-purple';
    
    function loadResume() {
      const activeId = StorageManager.getActiveId();
      const data = StorageManager.getResume(activeId);
      if (!data) return;

      const page = document.getElementById('resume-a4-page');
      
      // Basic Structure setup
      page.innerHTML = `
        <div style="padding: 40px;">
          <div class="res-header">
            <h1 class="res-name">${data.full_name || 'Your Name'}</h1>
            <div class="res-sub">
              ${data.email ? `<span><i data-lucide="mail" style="width:12px"></i> ${data.email}</span>` : ''}
              ${data.contact_no ? `<span><i data-lucide="phone" style="width:12px"></i> ${data.contact_no}</span>` : ''}
              ${data.location ? `<span><i data-lucide="map-pin" style="width:12px"></i> ${data.location}</span>` : ''}
            </div>
            <div class="res-sub" style="margin-top: 8px;">
               ${data.link_github ? `<a href="${data.link_github}" style="color:#666; font-size:12px;">GitHub</a>` : ''}
               ${data.link_linkedin ? `<a href="${data.link_linkedin}" style="color:#666; font-size:12px;">LinkedIn</a>` : ''}
            </div>
          </div>

          ${data.summary ? `
            <div class="res-section">
              <h2 class="res-section-title">Professional Summary</h2>
              <p style="font-size:13px; line-height:1.6; color:#444;">${data.summary}</p>
            </div>
          ` : ''}

          ${data.experience && data.experience.length > 0 ? `
            <div class="res-section">
              <h2 class="res-section-title">Work Experience</h2>
              ${data.experience.map(exp => `
                <div style="margin-bottom: 12px;">
                  <div style="display:flex; justify-content:space-between; font-weight:600; font-size:14px;">
                    <span>${exp.title}</span>
                    <span>${exp.duration}</span>
                  </div>
                  <div style="color:#666; font-size:13px; margin-bottom:4px;">${exp.company} | ${exp.location}</div>
                  <p style="font-size:12px; color:#555;">${exp.desc}</p>
                </div>
              `).join('')}
            </div>
          ` : ''}

          <div style="display: grid; grid-template-columns: 1.5fr 1fr; gap: 30px;">
            <div>
               ${data.projects_list && data.projects_list.length > 0 ? `
                <div class="res-section">
                  <h2 class="res-section-title">Major Projects</h2>
                  ${data.projects_list.map(proj => `
                    <div style="margin-bottom:10px;">
                      <div style="font-weight:600; font-size:13px;">${proj.name}</div>
                      <div style="font-size:11px; color:#482E87; margin-bottom:2px;">${proj.tech}</div>
                      <p style="font-size:12px; color:#555;">${proj.desc}</p>
                    </div>
                  `).join('')}
                </div>
              ` : ''}
            </div>
            <div>
              ${data.skills ? `
                <div class="res-section">
                  <h2 class="res-section-title">Key Skills</h2>
                  <div style="display:flex; flex-wrap:wrap; gap:5px;">
                    ${data.skills.split(',').map(s => `<span style="background:#f0f0f5; padding:4px 10px; border-radius:4px; font-size:12px;">${s.trim()}</span>`).join('')}
                  </div>
                </div>
              ` : ''}

              ${data.education && data.education.length > 0 ? `
                <div class="res-section">
                  <h2 class="res-section-title">Education</h2>
                  ${data.education.map(edu => `
                    <div style="margin-bottom:10px;">
                      <div style="font-weight:600; font-size:13px;">${edu.degree}</div>
                      <div style="font-size:12px; color:#666;">${edu.college}</div>
                      <div style="font-size:11px; color:#888;">${edu.start_year} - ${edu.end_year} | ${edu.cgpa}</div>
                    </div>
                  `).join('')}
                </div>
              ` : ''}
            </div>
          </div>
        </div>

        ${data.profile_pic ? `
           <img src="${data.profile_pic}" style="position:absolute; top:40px; right:40px; width:100px; height:100px; border-radius:50%; object-fit:cover; border:3px solid #f0f0f0;">
        ` : ''}
      `;
      
      lucide.createIcons();
    }

    async function downloadPDF() {
      const element = document.getElementById('resume-a4-page');
      const canvas = await html2canvas(element, {
        scale: 2,
        useCORS: true,
        logging: false
      });
      
      const imgData = canvas.toDataURL('image/png');
      const pdf = new jsPDF('p', 'mm', 'a4');
      const imgProps = pdf.getImageProperties(imgData);
      const pdfWidth = pdf.internal.pageSize.getWidth();
      const pdfHeight = (imgProps.height * pdfWidth) / imgProps.width;
      
      pdf.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight);
      pdf.save('my-resume.pdf');
    }

    async function shareResume() {
        const activeId = StorageManager.getActiveId();
        const data = StorageManager.getResume(activeId);
        const shareData = {
            title: 'My Professional Resume',
            text: `Check out my resume created with Resume Builder Pro!`,
            url: window.location.href
        };

        try {
            if (navigator.share) {
                await navigator.share(shareData);
            } else {
                await navigator.clipboard.writeText(window.location.href);
                alert('Link copied to clipboard!');
            }
        } catch (err) {
            console.error('Error sharing:', err);
        }
    }

    window.onload = loadResume;
  </script>
</body>
</html>
