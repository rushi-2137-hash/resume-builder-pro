<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resume Builder - Preview</title>
  <link rel="stylesheet" href="style.css">
  <!-- Google Font: Outfit -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- Data Persistence -->
  <script src="storage_manager.js"></script>
  <!-- HTML2PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    /* Inline styles for preview engine specific layout */
    .preview-canvas {
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: #f8f9fa;
    }

    .resume-header {
      background: #fff;
      padding: 15px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #eee;
    }

    .resume-container {
      flex: 1;
      overflow-y: auto;
      padding: 40px 20px;
      display: flex;
      justify-content: center;
      background: #f1f3f6;
    }

    #resume-canvas {
      background: #fff;
      width: 210mm; /* A4 Width */
      min-height: 297mm; /* A4 Height */
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      transform-origin: top center;
      margin: 0 auto;
    }

    /* Fixed Desktop Action Header */
    .preview-header-desktop {
      position: fixed;
      top: 0;
      right: 0;
      width: calc(100% - 360px); /* Account for active sidebar widths */
      height: 70px;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid #eef0f2;
      display: none; /* Shown via media query in style.css */
      justify-content: flex-end;
      align-items: center;
      padding: 0 40px;
      z-index: 1000;
    }

    @media (min-width: 481px) {
      .preview-header-desktop {
        display: flex;
      }
    }

    .preview-top-actions {
      display: flex;
      gap: 12px;
    }

    .btn-download {
      background: #482E87;
      color: #fff;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-print {
      background: #fff;
      color: #333;
      border: 1px solid #ddd;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Mobile Bottom Actions */
    .preview-bottom-actions {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: #fff;
      padding: 20px;
      display: flex;
      gap: 12px;
      border-top: 1px solid #eee;
      z-index: 100;
    }

    @media (min-width: 481px) {
      .preview-bottom-actions {
        display: none;
      }
    }
  </style>
</head>
<body class="dashboard-body">

  <div class="canvas">
    <div class="device-frame">
      <div class="preview-canvas">
        
        <!-- Mobile Header (hidden on desktop focus mode) -->
        <div class="resume-header">
          <div class="header-left" onclick="window.location.href='templates.html'">
            <i data-lucide="arrow-left"></i>
            <span class="header-title">Preview</span>
          </div>
          <div class="header-right">
            <i data-lucide="share-2"></i>
          </div>
        </div>

        <!-- Fixed Desktop Action Header -->
        <div class="preview-header-desktop">
          <div class="preview-top-actions">
            <button class="btn-print" onclick="window.print()">
              <i data-lucide="printer"></i> Print
            </button>
            <button class="btn-download" onclick="downloadPDF()">
              <i data-lucide="download"></i> Download PDF
            </button>
          </div>
        </div>

        <!-- Desktop Theme Sidebar -->
        <div class="desktop-preview-sidebar">
          <h2 class="sidebar-header-title">Theme Colors</h2>
          <div class="theme-selector-grid">
            <div class="theme-circle active" style="background: #482E87;" onclick="setTheme('#482E87', this)"></div>
            <div class="theme-circle" style="background: #2196F3;" onclick="setTheme('#2196F3', this)"></div>
            <div class="theme-circle" style="background: #E91E63;" onclick="setTheme('#E91E63', this)"></div>
            <div class="theme-circle" style="background: #4CAF50;" onclick="setTheme('#4CAF50', this)"></div>
            <div class="theme-circle" style="background: #FF9800;" onclick="setTheme('#FF9800', this)"></div>
            <div class="theme-circle" style="background: #795548;" onclick="setTheme('#795548', this)"></div>
            <div class="theme-circle" style="background: #607D8B;" onclick="setTheme('#607D8B', this)"></div>
            <div class="theme-circle" style="background: #263238;" onclick="setTheme('#263238', this)"></div>
          </div>

          <div style="margin-top: 40px; border-top: 1px solid #eee; padding-top: 20px;">
            <p style="font-size: 13px; color: #888; margin-bottom: 15px;">Tips: High quality PDF export works best on desktop browsers.</p>
          </div>
        </div>

        <!-- Main Resume Container -->
        <div class="resume-container">
          <div id="resume-canvas">
            <!-- Dynamic resume content will be injected here -->
          </div>
        </div>

        <!-- Mobile Bottom Actions -->
        <div class="preview-bottom-actions">
          <button class="btn-print" style="flex: 1;" onclick="window.print()">Print</button>
          <button class="btn-download" style="flex: 2;" onclick="downloadPDF()">Download PDF</button>
        </div>

        <!-- Bottom Navigation (Desktop Sidebar Icons) -->
        <div class="bottom-navigation">
          <div class="nav-item" onclick="window.location.href='home.html'">
            <i data-lucide="home"></i>
            <span>Home</span>
          </div>
          <div class="nav-item" onclick="window.location.href='templates.html'">
            <i data-lucide="file-text"></i>
            <span>Templates</span>
          </div>
          <div class="nav-item active">
            <i data-lucide="eye"></i>
            <span>Preview</span>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script>
    lucide.createIcons();

    const resumeCanvas = document.getElementById('resume-canvas');
    const params = new URLSearchParams(window.location.search);
    const templateId = params.get('template') || 'modern-purple';
    
    let currentThemeColor = '#482E87';

    function loadResumeData() {
      const activeId = StorageManager.getActiveId();
      const data = StorageManager.getResume(activeId);
      
      if (!data) {
        resumeCanvas.innerHTML = '<div style="padding: 50px; text-align: center;">No resume data found. Please go back and fill the form.</div>';
        return;
      }

      renderTemplate(templateId, data);
      scaleResume();
    }

    function renderTemplate(id, data) {
      // Basic structure for a modern template
      const html = `
        <div class="resume-wrapper" style="padding: 40px; color: #333; font-family: sans-serif; position: relative; height: 100%;">
          <!-- Header -->
          <div class="resume-inner-header" style="border-left: 6px solid ${currentThemeColor}; padding-left: 20px; margin-bottom: 30px;">
            <h1 style="font-size: 32px; margin: 0; color: #111;">${data.full_name || 'Your Name'}</h1>
            <div style="display: flex; gap: 15px; margin-top: 10px; font-size: 14px; color: #666;">
              <span>${data.email || ''}</span>
              <span>${data.contact_no || ''}</span>
              <span>${data.location || ''}</span>
            </div>
          </div>

          <!-- Summary -->
          ${data.summary ? `
            <div class="resume-section" style="margin-bottom: 25px;">
              <h2 style="font-size: 18px; color: ${currentThemeColor}; text-transform: uppercase; border-bottom: 1px solid #eee; padding-bottom: 5px; margin-bottom: 12px;">Profile</h2>
              <p style="font-size: 14px; line-height: 1.6; color: #444;">${data.summary}</p>
            </div>
          ` : ''}

          <!-- Experience -->
          ${data.experience && data.experience.length > 0 ? `
            <div class="resume-section" style="margin-bottom: 25px;">
              <h2 style="font-size: 18px; color: ${currentThemeColor}; text-transform: uppercase; border-bottom: 1px solid #eee; padding-bottom: 5px; margin-bottom: 12px;">Experience</h2>
              ${data.experience.map(exp => `
                <div style="margin-bottom: 15px;">
                  <div style="display: flex; justify-content: space-between; font-weight: 700; font-size: 15px;">
                    <span>${exp.title}</span>
                    <span>${exp.duration}</span>
                  </div>
                  <div style="font-style: italic; color: #666; font-size: 14px; margin-bottom: 5px;">${exp.company}, ${exp.location}</div>
                  <p style="font-size: 13px; line-height: 1.5; color: #555;">${exp.desc}</p>
                </div>
              `).join('')}
            </div>
          ` : ''}

          <!-- Education -->
          ${data.education && data.education.length > 0 ? `
            <div class="resume-section" style="margin-bottom: 25px;">
              <h2 style="font-size: 18px; color: ${currentThemeColor}; text-transform: uppercase; border-bottom: 1px solid #eee; padding-bottom: 5px; margin-bottom: 12px;">Education</h2>
              ${data.education.map(edu => `
                <div style="margin-bottom: 12px;">
                  <div style="display: flex; justify-content: space-between; font-weight: 700; font-size: 15px;">
                    <span>${edu.degree}</span>
                    <span>${edu.start_year} - ${edu.end_year}</span>
                  </div>
                  <div style="color: #666; font-size: 14px;">${edu.college}, ${edu.location}</div>
                  ${edu.cgpa ? `<div style="font-size: 13px; color: #555; margin-top: 2px;">CGPA: ${edu.cgpa}</div>` : ''}
                </div>
              `).join('')}
            </div>
          ` : ''}

          <!-- Skills -->
          ${data.skills ? `
            <div class="resume-section">
              <h2 style="font-size: 18px; color: ${currentThemeColor}; text-transform: uppercase; border-bottom: 1px solid #eee; padding-bottom: 5px; margin-bottom: 12px;">Skills</h2>
              <p style="font-size: 14px; line-height: 1.6; color: #444;">${data.skills}</p>
            </div>
          ` : ''}
        </div>
      `;
      resumeCanvas.innerHTML = html;
    }

    function scaleResume() {
      const container = document.querySelector('.resume-container');
      const canvas = document.getElementById('resume-canvas');
      if (!container || !canvas) return;

      const sidebarWidth = window.innerWidth > 480 ? 360 : 0; // Sidebar (80) + Theme Bar (280)
      const availableWidth = window.innerWidth - sidebarWidth - 80; // 80px buffer
      const canvasWidth = 794; // 210mm at 96dpi approx
      
      let scale = availableWidth / canvasWidth;
      if (scale > 1) scale = 1;

      // Centering logic
      const marginLeft = (container.offsetWidth - (canvasWidth * scale)) / 2;
      
      canvas.style.transform = `scale(${scale})`;
      canvas.style.marginLeft = `${Math.max(0, marginLeft)}px`;
      
      // Precision Height Adjustment to ensure scrollability
      // We manually calculate the visual height after scaling to add a bottom spacer
      const visualHeight = 1123 * scale; // A4 Height is 297mm approx 1123px
      canvas.style.marginBottom = `${-(1123 - visualHeight) + 40}px`;
    }

    function setTheme(color, el) {
      currentThemeColor = color;
      document.querySelectorAll('.theme-circle').forEach(c => c.classList.remove('active'));
      el.classList.add('active');
      loadResumeData();
    }

    function downloadPDF() {
      const element = document.getElementById('resume-canvas');
      const opt = {
        margin: 0,
        filename: 'resume.pdf',
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2, useCORS: true },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
      };
      html2pdf().from(element).set(opt).save();
    }

    window.onresize = scaleResume;
    window.onload = loadResumeData;
  </script>
</body>
</html>
