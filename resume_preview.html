<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resume Preview - Resume Builder</title>
  <link rel="stylesheet" href="style.css?v=2.0">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="storage_manager.js"></script>
</head>
<body class="dashboard-body">
  <div class="canvas">
    <div class="device-frame">
      <div class="resume-header">
        <div class="header-left" onclick="window.history.back()">
          <i data-lucide="arrow-left"></i>
          <span class="header-title">Preview</span>
        </div>
      </div>
      <div class="scrollable-content">
        <div id="resume-a4-page" style="padding: 20px; background: #fff;">
          <!-- Content populated Dynamicly -->
        </div>
      </div>
    </div>
  </div>
  <script>lucide.createIcons();</script>
</body>
</html>
